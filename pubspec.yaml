name: care_ai
description: "CARE-AI — AI Parenting Companion for Children with Disabilities"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  google_sign_in: ^6.2.2

  # Google AI (Gemini)
  google_generative_ai: ^0.4.6

  # State Management
  provider: ^6.1.2

  # Text-to-Speech & Speech-to-Text
  flutter_tts: ^4.2.0
  speech_to_text: ^7.3.0

  # Fonts & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Charts
  fl_chart: ^0.70.2

  # Date Formatting
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.1
  image_picker: ^1.1.2
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.2.0+3
  flutter_markdown: ^0.7.6
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
