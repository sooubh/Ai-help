name: care_ai
description: "CARE-AI — AI Parenting Companion for Children with Disabilities"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5

  # State Management
  provider: ^6.1.2

  # Text-to-Speech
  flutter_tts: ^4.2.0

  # Fonts
  google_fonts: ^6.2.1

  # Date Formatting
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
